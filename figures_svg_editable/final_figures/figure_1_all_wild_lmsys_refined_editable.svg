<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3309" height="1045" viewBox="0 0 3309 1045" role="img" aria-label="Analytic framework for studying informal learning in everyday human-LLM interaction">
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; dominant-baseline: alphabetic; }
      .panel-title { font-size: 52px; font-weight: 700; }
      .subtitle { font-size: 38px; font-weight: 400; fill: #334150; }
      .section-title { font-size: 38px; font-weight: 700; }
      .chip { font-size: 31px; font-weight: 700; }
      .small-label { font-size: 24px; font-weight: 700; letter-spacing: .015em; }
      .body { font-size: 37px; font-weight: 400; fill: #1F2933; }
      .small-body { font-size: 31px; font-weight: 700; }
      .foot { font-size: 29px; font-weight: 400; fill: #4E5966; }
    </style>
    <marker id="arrow-grey" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6F7A85"/>
    </marker>
    <marker id="arrow-small-grey" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#7A838C"/>
    </marker>
  </defs>

  <rect width="3309" height="1045" fill="#FFFFFF"/>

  <!-- Panel a -->
  <g id="panel-a">
    <rect x="2" y="3" width="862" height="1040" rx="46" fill="#F3F7FA" stroke="#204F75" stroke-width="4"/>
    <circle cx="86" cy="89" r="56" fill="#1F4E79"/>
    <text x="86" y="104" text-anchor="middle" font-size="44" font-weight="700" fill="#FFFFFF">a</text>
