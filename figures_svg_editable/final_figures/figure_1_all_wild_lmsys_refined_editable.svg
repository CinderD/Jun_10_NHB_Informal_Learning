    <rect x="436" y="425" width="169" height="74" fill="#FFFFFF" stroke="#78ABD3" stroke-width="3"/>
    <rect x="627" y="425" width="169" height="74" fill="#FFFFFF" stroke="#78ABD3" stroke-width="3"/>
