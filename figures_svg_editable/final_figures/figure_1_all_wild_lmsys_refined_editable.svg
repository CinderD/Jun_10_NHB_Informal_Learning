    <rect x="2448" y="546" width="809" height="140" fill="#FFFFFF" stroke="#B69CE2" stroke-width="2.5"/>
    <circle cx="2532" cy="616" r="51" fill="#EEE7F5"/>
    <circle cx="2513" cy="596" r="14" fill="#6B538D"/>
    <circle cx="2545" cy="596" r="14" fill="#6B538D"/>
    <path d="M2505 642 C2518 610 2530 610 2543 642" fill="none" stroke="#6B538D" stroke-width="6" stroke-linecap="round"/>
    <path d="M2558 642 C2548 613 2535 610 2522 642" fill="none" stroke="#6B538D" stroke-width="6" stroke-linecap="round"/>
    <text x="2602" y="604" font-size="32" font-weight="700" fill="#6B538D">Contextual variation</text>
    <text x="2602" y="648" font-size="31" font-weight="700" fill="#1F2933">Where is engagement concentrated?</text>

    <rect x="2448" y="772" width="809" height="140" fill="#FFFFFF" stroke="#B69CE2" stroke-width="2.5"/>
    <circle cx="2532" cy="842" r="51" fill="#EEE7F5"/>
    <circle cx="2532" cy="820" r="14" fill="#6B538D"/>
    <circle cx="2508" cy="862" r="14" fill="#6B538D"/>
    <circle cx="2556" cy="862" r="14" fill="#6B538D"/>
    <line x1="2532" y1="820" x2="2508" y2="862" stroke="#6B538D" stroke-width="6"/>
    <line x1="2532" y1="820" x2="2556" y2="862" stroke="#6B538D" stroke-width="6"/>
    <line x1="2508" y1="862" x2="2556" y2="862" stroke="#6B538D" stroke-width="6"/>
    <text x="2602" y="829" font-size="32" font-weight="700" fill="#6B538D">Scaffolding association</text>
    <text x="2602" y="873" font-size="31" font-weight="700" fill="#1F2933">How scaffolding aligns with engagement?</text>
    <line x1="2448" y1="956" x2="3259" y2="956" stroke="#6B538D" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
