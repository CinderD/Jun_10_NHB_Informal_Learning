    <text x="1158" y="644" text-anchor="middle" font-size="37" font-weight="700" fill="#1F4E79">P</text>
    <text class="body" x="1226" y="645">passive receipt</text>
    <circle cx="1158" cy="720" r="36" fill="#F9FCFE" stroke="#79ADD3" stroke-width="2"/>
    <text x="1158" y="733" text-anchor="middle" font-size="37" font-weight="700" fill="#1F4E79">A</text>
    <text class="body" x="1226" y="733">active uptake</text>
    <circle cx="1158" cy="808" r="36" fill="#F5FFF8" stroke="#45A36D" stroke-width="3"/>
    <text x="1158" y="821" text-anchor="middle" font-size="37" font-weight="700" fill="#45A36D">C</text>
    <text x="1226" y="821" font-size="37" font-weight="700" fill="#49A36D">constructive engage</text>

    <line x1="1625" y1="478" x2="1625" y2="929" stroke="#B4BEC6" stroke-width="4"/>

