    <text class="chip" x="521" y="476" text-anchor="middle" fill="#1F4E79">LMSYS</text>
    <text class="chip" x="712" y="476" text-anchor="middle" fill="#1F4E79">ShareChat</text>
    <line x1="78" y1="531" x2="789" y2="531" stroke="#B5CEE0" stroke-width="2.5" stroke-dasharray="10 9"/>

