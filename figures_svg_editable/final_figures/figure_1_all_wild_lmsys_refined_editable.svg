    <text class="subtitle" x="1183" y="186">Translate learning-science constructs</text>
    <text class="subtitle" x="1183" y="237">into role-specific turn-level signals</text>
    <line x1="1093" y1="274" x2="2176" y2="274" stroke="#BF6C27" stroke-width="3" stroke-linecap="round"/>

