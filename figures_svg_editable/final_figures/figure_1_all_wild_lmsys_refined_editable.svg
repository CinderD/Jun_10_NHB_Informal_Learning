    <text class="panel-title" x="2574" y="105" fill="#57406F">From signals to evidence</text>
    <text class="subtitle" x="2555" y="186">Labels are transformed into descriptive</text>
    <text class="subtitle" x="2555" y="237">associational and temporal analyses</text>
    <line x1="2448" y1="274" x2="3259" y2="274" stroke="#6B538D" stroke-width="4" stroke-linecap="round"/>

