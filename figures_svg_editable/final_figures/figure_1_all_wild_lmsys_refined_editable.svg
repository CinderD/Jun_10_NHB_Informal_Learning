    <text x="1634" y="408" text-anchor="middle" font-size="32" font-weight="700" fill="#3E4957">pedagogical support</text>
    <line x1="1828" y1="378" x2="1882" y2="378" stroke="#7A838C" stroke-width="4" marker-end="url(#arrow-small-grey)"/>
    <rect x="1905" y="314" width="290" height="124" rx="19" fill="#F7FBFD" stroke="#79ADD3" stroke-width="3"/>
    <text x="2030" y="364" text-anchor="middle" font-size="37" font-weight="700" fill="#1F4E79">User</text>
    <text x="2109" y="364" text-anchor="middle" font-size="37" font-style="italic" fill="#1F4E79">t+1</text>
    <text x="2050" y="407" text-anchor="middle" font-size="32" font-weight="700" fill="#3E4957">uptake</text>

