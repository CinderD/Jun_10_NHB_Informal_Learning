    <text class="panel-title" x="170" y="172" fill="#1F4E79">interaction contexts</text>
    <text class="subtitle" x="78" y="237">Naturalistic conversations in everyday use</text>
    <line x1="78" y1="274" x2="141" y2="274" stroke="#204F75" stroke-width="4" stroke-linecap="round"/>
    <line x1="139" y1="274" x2="786" y2="274" stroke="#204F75" stroke-width="4" stroke-linecap="round"/>

