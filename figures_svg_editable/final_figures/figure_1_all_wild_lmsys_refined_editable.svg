    <circle cx="122" cy="814" r="20" fill="#1F4E79"/>
    <path d="M94 883 C98 848 111 830 122 830 C133 830 146 848 150 883 Z" fill="#1F4E79"/>
    <text class="section-title" x="246" y="810" fill="#1F4E79">User framing</text>
