    <text x="1942" y="655" text-anchor="middle" font-size="31" font-weight="700" fill="#000000">non-scaffolded reference</text>
    <rect x="1682" y="720" width="520" height="91" fill="#FFF2D6" stroke="#E6843B" stroke-width="3"/>
    <text x="1942" y="778" text-anchor="middle" font-size="31" font-weight="700" fill="#A65B21">scaffolded support</text>
    <line x1="1729" y1="794" x2="1729" y2="845" stroke="#8A949E" stroke-width="5" marker-end="url(#arrow-small-grey)"/>
    <line x1="2153" y1="794" x2="2153" y2="845" stroke="#8A949E" stroke-width="5" marker-end="url(#arrow-small-grey)"/>
    <rect x="1682" y="835" width="250" height="103" rx="18" fill="#FFFFFF" stroke="#E6843B" stroke-width="3"/>
    <rect x="1950" y="835" width="252" height="103" rx="18" fill="#FFFFFF" stroke="#E6843B" stroke-width="3"/>
    <text x="1807" y="876" text-anchor="middle" font-size="32" font-weight="700" fill="#A65B21">I1-I3</text>
    <text x="1807" y="917" text-anchor="middle" font-size="32" font-weight="700" fill="#1F2933">intents</text>
    <text x="2076" y="876" text-anchor="middle" font-size="32" font-weight="700" fill="#A65B21">M1-M6</text>
    <text x="2076" y="917" text-anchor="middle" font-size="32" font-weight="700" fill="#1F2933">means</text>
    <line x1="1093" y1="956" x2="2176" y2="956" stroke="#BF6C27" stroke-width="3" stroke-linecap="round"/>
    <text class="foot" x="1640" y="1006" text-anchor="middle">User behavioural signatures as proxy for potential learning outcome</text>
  </g>

  <!-- Panel c -->
  <g id="panel-c">
    <rect x="2405" y="3" width="902" height="1040" rx="46" fill="#FBF9FE" stroke="#6B538D" stroke-width="4"/>
    <circle cx="2490" cy="89" r="56" fill="#6B538D"/>
