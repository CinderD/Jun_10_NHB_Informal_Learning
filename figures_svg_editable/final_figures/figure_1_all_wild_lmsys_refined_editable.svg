  <line x1="2290" y1="526" x2="2363" y2="526" stroke="#6F7A85" stroke-width="10" marker-end="url(#arrow-grey)"/>

  <!-- Panel b -->
  <g id="panel-b">
    <rect x="1014" y="3" width="1240" height="1040" rx="46" fill="#FFF9F2" stroke="#B96B27" stroke-width="4"/>
