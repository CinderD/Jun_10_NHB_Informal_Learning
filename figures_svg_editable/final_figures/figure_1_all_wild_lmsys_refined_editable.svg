    <path d="M101 349 h37 c18 0 32 13 32 30 c0 17 -14 30 -32 30 h-22 l-35 20 l10 -25 c-10 -6 -16 -15 -16 -26 c0 -16 10 -29 26 -29z" fill="#1F4E79"/>
    <path d="M136 382 h27 c18 0 29 11 29 26 c0 15 -12 27 -31 27 h-22 l-31 19 l8 -24 c-8 -5 -13 -14 -13 -24 c0 -14 12 -24 33 -24z" fill="#2D5C84"/>
    <circle cx="100" cy="376" r="5" fill="#FFFFFF"/>
